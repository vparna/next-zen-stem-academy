<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background elements -->
  <circle cx="350" cy="50" r="30" fill="#E0E7FF" opacity="0.5"/>
  <circle cx="50" cy="250" r="40" fill="#DBEAFE" opacity="0.5"/>
  
  <!-- Robot -->
  <g transform="translate(240, 120)">
    <!-- Robot body -->
    <rect x="10" y="30" width="60" height="70" rx="8" fill="#60A5FA" stroke="#2563EB" stroke-width="2"/>
    <!-- Robot head -->
    <rect x="15" y="0" width="50" height="40" rx="5" fill="#93C5FD" stroke="#2563EB" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="30" cy="15" r="5" fill="#1E40AF"/>
    <circle cx="50" cy="15" r="5" fill="#1E40AF"/>
    <!-- Antenna -->
    <line x1="40" y1="0" x2="40" y2="-10" stroke="#2563EB" stroke-width="2"/>
    <circle cx="40" cy="-12" r="3" fill="#EF4444"/>
    <!-- Arms -->
    <rect x="-5" y="40" width="15" height="35" rx="4" fill="#60A5FA" stroke="#2563EB" stroke-width="2"/>
    <rect x="70" y="40" width="15" height="35" rx="4" fill="#60A5FA" stroke="#2563EB" stroke-width="2"/>
    <!-- Legs -->
    <rect x="20" y="100" width="15" height="30" rx="4" fill="#3B82F6" stroke="#2563EB" stroke-width="2"/>
    <rect x="45" y="100" width="15" height="30" rx="4" fill="#3B82F6" stroke="#2563EB" stroke-width="2"/>
    <!-- Control panel -->
    <circle cx="40" cy="55" r="8" fill="#FCD34D" stroke="#F59E0B" stroke-width="2"/>
    <rect x="25" y="70" width="10" height="15" rx="2" fill="#34D399"/>
    <rect x="45" y="70" width="10" height="15" rx="2" fill="#F87171"/>
  </g>
  
  <!-- Kid 1 (Girl with ponytail) -->
  <g transform="translate(100, 140)">
    <!-- Head -->
    <circle cx="25" cy="20" r="18" fill="#FDB4B4"/>
    <!-- Hair/Ponytail -->
    <ellipse cx="25" cy="10" rx="20" ry="12" fill="#8B4513"/>
    <ellipse cx="45" cy="15" rx="8" ry="12" fill="#8B4513"/>
    <!-- Eyes -->
    <circle cx="20" cy="20" r="2" fill="#000"/>
    <circle cx="30" cy="20" r="2" fill="#000"/>
    <!-- Smile -->
    <path d="M 20 25 Q 25 28 30 25" stroke="#000" stroke-width="1.5" fill="none"/>
    <!-- Body -->
    <rect x="10" y="38" width="30" height="40" rx="15" fill="#EC4899"/>
    <!-- Arms pointing at robot -->
    <path d="M 10 45 L -5 50" stroke="#FDB4B4" stroke-width="8" stroke-linecap="round"/>
    <path d="M 40 45 L 60 40" stroke="#FDB4B4" stroke-width="8" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="15" y="75" width="10" height="25" rx="5" fill="#1E40AF"/>
    <rect x="25" y="75" width="10" height="25" rx="5" fill="#1E40AF"/>
  </g>
  
  <!-- Kid 2 (Boy with cap) -->
  <g transform="translate(50, 155)">
    <!-- Head -->
    <circle cx="25" cy="15" r="16" fill="#FBBF77"/>
    <!-- Cap -->
    <ellipse cx="25" cy="5" rx="18" ry="8" fill="#3B82F6"/>
    <rect x="7" y="2" width="36" height="6" rx="3" fill="#2563EB"/>
    <!-- Eyes -->
    <circle cx="20" cy="15" r="2" fill="#000"/>
    <circle cx="30" cy="15" r="2" fill="#000"/>
    <!-- Smile -->
    <path d="M 19 20 Q 25 23 31 20" stroke="#000" stroke-width="1.5" fill="none"/>
    <!-- Body -->
    <rect x="12" y="31" width="26" height="35" rx="13" fill="#10B981"/>
    <!-- Arms -->
    <path d="M 12 38 L 0 45" stroke="#FBBF77" stroke-width="7" stroke-linecap="round"/>
    <path d="M 38 38 L 50 45" stroke="#FBBF77" stroke-width="7" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="16" y="63" width="8" height="22" rx="4" fill="#7C3AED"/>
    <rect x="26" y="63" width="8" height="22" rx="4" fill="#7C3AED"/>
  </g>
  
  <!-- Tools and parts scattered -->
  <g transform="translate(150, 240)">
    <rect x="0" y="0" width="20" height="8" rx="2" fill="#F59E0B"/>
    <circle cx="30" cy="4" r="6" fill="#EF4444"/>
    <rect x="45" y="-2" width="12" height="12" rx="2" fill="#8B5CF6" opacity="0.7"/>
  </g>
  
  <!-- Sparkles/excitement -->
  <g fill="#FBBF24">
    <path d="M 180 100 l 3 6 l 6 1 l -5 4 l 2 6 l -6 -3 l -6 3 l 2 -6 l -5 -4 l 6 -1 z"/>
    <path d="M 320 140 l 2 4 l 4 0.5 l -3 3 l 1 4 l -4 -2 l -4 2 l 1 -4 l -3 -3 l 4 -0.5 z"/>
  </g>
  
  <!-- Text bubble -->
  <g transform="translate(30, 50)">
    <ellipse cx="50" cy="30" rx="45" ry="20" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E40AF" text-anchor="middle">Let's Build!</text>
  </g>
</svg>

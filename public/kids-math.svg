<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background elements -->
  <circle cx="340" cy="60" r="40" fill="#DBEAFE" opacity="0.5"/>
  <circle cx="70" cy="250" r="35" fill="#FEF3C7" opacity="0.5"/>
  
  <!-- Whiteboard/Chalkboard -->
  <g transform="translate(120, 80)">
    <rect x="0" y="0" width="180" height="140" rx="6" fill="#1E3A8A" stroke="#1E40AF" stroke-width="3"/>
    
    <!-- Math equations and problems -->
    <text x="15" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">2 + 2 = 4</text>
    <text x="15" y="60" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FDE047">5 × 3 = 15</text>
    <text x="15" y="90" font-family="Arial, sans-serif" font-size="18" fill="#86EFAC">10 ÷ 2 = 5</text>
    
    <!-- Shapes -->
    <circle cx="150" cy="30" r="12" fill="none" stroke="#F472B6" stroke-width="2"/>
    <rect x="130" y="50" width="20" height="20" fill="none" stroke="#60A5FA" stroke-width="2"/>
    <path d="M 150 80 L 160 100 L 140 100 Z" fill="none" stroke="#34D399" stroke-width="2"/>
    
    <!-- Fun calculation -->
    <text x="20" y="120" font-family="Arial, sans-serif" font-size="16" fill="#FCD34D">🌟 = 7</text>
  </g>
  
  <!-- Kid 1 (Boy with raised hand) -->
  <g transform="translate(50, 130)">
    <!-- Head -->
    <circle cx="28" cy="22" r="19" fill="#FBBF77"/>
    <!-- Hair -->
    <ellipse cx="28" cy="12" rx="20" ry="13" fill="#2D1810"/>
    <!-- Eyes (excited) -->
    <circle cx="22" cy="22" r="2.5" fill="#000"/>
    <circle cx="34" cy="22" r="2.5" fill="#000"/>
    <!-- Big smile -->
    <path d="M 20 28 Q 28 33 36 28" stroke="#000" stroke-width="2" fill="none"/>
    <!-- Body -->
    <rect x="13" y="41" width="30" height="44" rx="15" fill="#10B981"/>
    <!-- Raised arm (answering) -->
    <path d="M 13 50 Q 8 35 10 20" stroke="#FBBF77" stroke-width="10" stroke-linecap="round"/>
    <circle cx="10" cy="18" r="6" fill="#FBBF77"/>
    <!-- Other arm -->
    <path d="M 43 50 L 53 65" stroke="#FBBF77" stroke-width="10" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="17" y="83" width="10" height="27" rx="5" fill="#059669"/>
    <rect x="29" y="83" width="10" height="27" rx="5" fill="#059669"/>
  </g>
  
  <!-- Kid 2 (Girl solving problem) -->
  <g transform="translate(310, 140)">
    <!-- Head -->
    <circle cx="28" cy="20" r="18" fill="#FDB4B4"/>
    <!-- Hair with headband -->
    <ellipse cx="28" cy="10" rx="19" ry="12" fill="#8B4513"/>
    <rect x="10" y="12" width="36" height="4" rx="2" fill="#EC4899"/>
    <!-- Eyes (focused) -->
    <circle cx="22" cy="20" r="2" fill="#000"/>
    <circle cx="34" cy="20" r="2" fill="#000"/>
    <!-- Smile -->
    <path d="M 22 26 Q 28 29 34 26" stroke="#000" stroke-width="1.5" fill="none"/>
    <!-- Body -->
    <rect x="14" y="38" width="28" height="40" rx="14" fill="#8B5CF6"/>
    <!-- Arms -->
    <path d="M 14 46 L 0 55" stroke="#FDB4B4" stroke-width="9" stroke-linecap="round"/>
    <path d="M 42 46 L 56 55" stroke="#FDB4B4" stroke-width="9" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="18" y="76" width="9" height="24" rx="4.5" fill="#6D28D9"/>
    <rect x="29" y="76" width="9" height="24" rx="4.5" fill="#6D28D9"/>
    
    <!-- Notebook she's holding -->
    <g transform="translate(-5, 48)">
      <rect x="0" y="0" width="20" height="15" rx="2" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
      <line x1="3" y1="5" x2="17" y2="5" stroke="#3B82F6" stroke-width="1"/>
      <line x1="3" y1="8" x2="17" y2="8" stroke="#3B82F6" stroke-width="1"/>
      <line x1="3" y1="11" x2="12" y2="11" stroke="#3B82F6" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Numbers floating around -->
  <g fill="#FBBF24" font-family="Arial, sans-serif" font-weight="bold">
    <text x="30" y="80" font-size="24" opacity="0.7">1</text>
    <text x="360" y="100" font-size="28" opacity="0.7">3</text>
    <text x="340" y="220" font-size="26" opacity="0.7">7</text>
    <text x="50" y="200" font-size="24" opacity="0.7">9</text>
  </g>
  
  <!-- Math symbols floating -->
  <g fill="#8B5CF6" font-family="Arial, sans-serif" font-size="30" font-weight="bold" opacity="0.6">
    <text x="370" y="170">+</text>
    <text x="25" y="130">×</text>
    <text x="350" y="250">=</text>
  </g>
  
  <!-- Sparkles/stars of understanding -->
  <g fill="#FDE047">
    <path d="M 90 60 l 3 7 l 7 1 l -5 5 l 2 7 l -7 -4 l -7 4 l 2 -7 l -5 -5 l 7 -1 z"/>
    <path d="M 320 50 l 2.5 5 l 5 0.7 l -4 4 l 1.5 5 l -5 -3 l -5 3 l 1.5 -5 l -4 -4 l 5 -0.7 z"/>
    <path d="M 100 230 l 2 4 l 4 0.5 l -3 3 l 1 4 l -4 -2 l -4 2 l 1 -4 l -3 -3 l 4 -0.5 z"/>
  </g>
  
  <!-- Thought bubble with lightbulb (idea!) -->
  <g transform="translate(45, 30)">
    <circle cx="25" cy="25" r="20" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="18" cy="35" r="5" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5"/>
    <circle cx="13" cy="42" r="3" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1"/>
    <!-- Lightbulb -->
    <circle cx="25" cy="23" r="6" fill="#FDE047" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="23" y="28" width="4" height="4" rx="1" fill="#D97706"/>
    <line x1="18" y1="20" x2="15" y2="17" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="32" y1="20" x2="35" y2="17" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="25" y1="15" x2="25" y2="12" stroke="#F59E0B" stroke-width="1.5"/>
  </g>
  
  <!-- Calculator icon -->
  <g transform="translate(320, 230)">
    <rect x="0" y="0" width="30" height="40" rx="3" fill="#3B82F6" stroke="#1E40AF" stroke-width="2"/>
    <rect x="3" y="3" width="24" height="10" rx="2" fill="#DBEAFE"/>
    <circle cx="8" cy="20" r="2.5" fill="#FFFFFF"/>
    <circle cx="15" cy="20" r="2.5" fill="#FFFFFF"/>
    <circle cx="22" cy="20" r="2.5" fill="#FFFFFF"/>
    <circle cx="8" cy="27" r="2.5" fill="#FFFFFF"/>
    <circle cx="15" cy="27" r="2.5" fill="#FFFFFF"/>
    <circle cx="22" cy="27" r="2.5" fill="#FFFFFF"/>
  </g>
</svg>

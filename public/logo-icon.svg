<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="pgI" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="50%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffd54f"/>
    </linearGradient>
    <linearGradient id="pgmI" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </linearGradient>
    <linearGradient id="grI" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <radialGradient id="nuI" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="23" fill="url(#bgI)" stroke="#ffd740" stroke-width="0.75"/>

  <!-- Lotus + Atom icon centered at 24,26 -->
  <g transform="translate(24,27)">
    <!-- Green outer petals -->
    <ellipse cx="0" cy="3" rx="4" ry="12" fill="url(#grI)" transform="rotate(-75)" opacity="0.95"/>
    <ellipse cx="0" cy="3" rx="4" ry="12" fill="url(#grI)" transform="rotate(75)" opacity="0.95"/>
    <ellipse cx="0" cy="3" rx="3.5" ry="11" fill="url(#grI)" transform="rotate(-95)" opacity="0.85"/>
    <ellipse cx="0" cy="3" rx="3.5" ry="11" fill="url(#grI)" transform="rotate(95)" opacity="0.85"/>

    <!-- Mid gold petals -->
    <ellipse cx="0" cy="0" rx="4.5" ry="13" fill="url(#pgmI)" transform="rotate(-55)" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="4.5" ry="13" fill="url(#pgmI)" transform="rotate(55)" opacity="0.85"/>

    <!-- Main gold petals -->
    <ellipse cx="0" cy="0" rx="5" ry="14" fill="url(#pgI)" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="5" ry="14" fill="url(#pgI)" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="5.5" ry="15" fill="url(#pgI)"/>

    <!-- Atom orbits -->
    <ellipse cx="0" cy="-4" rx="10.5" ry="4.5" fill="none" stroke="#40c4ff" stroke-width="1.2" opacity="0.95"/>
    <ellipse cx="0" cy="-4" rx="10.5" ry="4.5" fill="none" stroke="#40c4ff" stroke-width="1.2" opacity="0.95" transform="rotate(60 0 -4)"/>
    <ellipse cx="0" cy="-4" rx="10.5" ry="4.5" fill="none" stroke="#40c4ff" stroke-width="1.2" opacity="0.95" transform="rotate(120 0 -4)"/>

    <!-- Nucleus -->
    <circle cx="0" cy="-4" r="3.5" fill="url(#nuI)" stroke="#ffd740" stroke-width="0.7"/>
    <circle cx="0" cy="-4" r="1.2" fill="#fff9c4" opacity="0.9"/>
  </g>
</svg>

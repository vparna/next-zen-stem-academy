<svg width="230" height="70" viewBox="0 0 230 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <linearGradient id="petalGoldW" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="50%" stop-color="#ff8f00"/>
      <stop offset="100%" stop-color="#ffd54f"/>
    </linearGradient>
    <linearGradient id="petalGoldMidW" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#ff6f00"/>
    </linearGradient>
    <linearGradient id="petalGreenW" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <radialGradient id="nucleusGradW" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </radialGradient>
    <radialGradient id="bgGlowW" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3949ab" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a237e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="230" height="70" rx="10" fill="url(#bgGradW)"/>
  <ellipse cx="37" cy="35" rx="32" ry="30" fill="url(#bgGlowW)"/>
  <rect width="230" height="70" rx="10" fill="none" stroke="#ffd740" stroke-width="0.75" opacity="0.4"/>

  <!-- ===== LOTUS + ATOM ICON ===== -->
  <g transform="translate(37,37)">
    <!-- Outer green leaf petals -->
    <ellipse cx="0" cy="4" rx="6" ry="18" fill="url(#petalGreenW)" transform="rotate(-75)" opacity="0.95"/>
    <ellipse cx="0" cy="4" rx="6" ry="18" fill="url(#petalGreenW)" transform="rotate(75)" opacity="0.95"/>
    <ellipse cx="0" cy="4" rx="5.5" ry="16" fill="url(#petalGreenW)" transform="rotate(-95)" opacity="0.85"/>
    <ellipse cx="0" cy="4" rx="5.5" ry="16" fill="url(#petalGreenW)" transform="rotate(95)" opacity="0.85"/>

    <!-- Mid gold petals (back layer) -->
    <ellipse cx="0" cy="0" rx="7" ry="20" fill="url(#petalGoldMidW)" transform="rotate(-55)" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="7" ry="20" fill="url(#petalGoldMidW)" transform="rotate(55)" opacity="0.85"/>

    <!-- Main gold petals -->
    <ellipse cx="0" cy="0" rx="7.5" ry="21" fill="url(#petalGoldW)" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="7.5" ry="21" fill="url(#petalGoldW)" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="8" ry="22" fill="url(#petalGoldW)"/>

    <!-- Atom orbits -->
    <ellipse cx="0" cy="-5" rx="16" ry="6.5" fill="none" stroke="#40c4ff" stroke-width="1.6" opacity="0.95"/>
    <ellipse cx="0" cy="-5" rx="16" ry="6.5" fill="none" stroke="#40c4ff" stroke-width="1.6" opacity="0.95" transform="rotate(60 0 -5)"/>
    <ellipse cx="0" cy="-5" rx="16" ry="6.5" fill="none" stroke="#40c4ff" stroke-width="1.6" opacity="0.95" transform="rotate(120 0 -5)"/>

    <!-- Atom nucleus -->
    <circle cx="0" cy="-5" r="5.5" fill="url(#nucleusGradW)" stroke="#ffd740" stroke-width="1"/>
    <circle cx="0" cy="-5" r="2" fill="#fff9c4" opacity="0.9"/>
  </g>

  <!-- ===== TEXT ===== -->
  <text font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5">
    <tspan x="74" y="34" fill="#ffffff">Next</tspan><tspan fill="#ffd740">Zen</tspan>
  </text>
  <text x="75" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="800"
        fill="#ff8f00" letter-spacing="3">STEM ACADEMY</text>
</svg>

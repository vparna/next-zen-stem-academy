<svg width="230" height="70" viewBox="0 0 230 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a8f"/>
      <stop offset="100%" stop-color="#0b1e6b"/>
    </linearGradient>
    <linearGradient id="petalOrangeW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="petalGreenW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="atomGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="sparkleW" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="230" height="70" rx="10" fill="url(#bgGradW)"/>

  <!-- Sparkle dots -->
  <circle cx="195" cy="12" r="2" fill="url(#sparkleW)"/>
  <circle cx="210" cy="25" r="1.5" fill="url(#sparkleW)"/>
  <circle cx="220" cy="14" r="1" fill="url(#sparkleW)"/>
  <circle cx="205" cy="55" r="1.5" fill="url(#sparkleW)"/>
  <circle cx="218" cy="50" r="1" fill="url(#sparkleW)"/>

  <!-- ===== LOTUS + ATOM ICON ===== -->
  <g transform="translate(38,36)">
    <ellipse cx="0" cy="0" rx="7" ry="18" fill="url(#petalOrangeW)" opacity="0.75" transform="rotate(-50)"/>
    <ellipse cx="0" cy="0" rx="7" ry="18" fill="url(#petalOrangeW)" opacity="0.75" transform="rotate(50)"/>
    <ellipse cx="0" cy="0" rx="7.5" ry="19" fill="url(#petalGreenW)" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="7.5" ry="19" fill="url(#petalGreenW)" transform="rotate(25)"/>
    <ellipse cx="0" cy="0" rx="8" ry="20" fill="url(#petalOrangeW)"/>
    <ellipse cx="0" cy="-6" rx="17" ry="7" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.9"/>
    <ellipse cx="0" cy="-6" rx="17" ry="7" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.9" transform="rotate(60 0 -6)"/>
    <ellipse cx="0" cy="-6" rx="17" ry="7" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.9" transform="rotate(120 0 -6)"/>
    <circle cx="0" cy="-6" r="6" fill="url(#atomGradW)" stroke="#fff" stroke-width="1.2"/>
    <circle cx="0" cy="-6" r="3" fill="#dbeafe"/>
  </g>

  <!-- ===== TEXT ===== -->
  <text font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="-0.5">
    <tspan x="74" y="34" fill="#ffffff">Next</tspan><tspan x="126" y="34" fill="#fbbf24">Zen</tspan>
  </text>
  <text x="75" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="800"
        fill="#f97316" letter-spacing="3">STEM ACADEMY</text>
</svg>

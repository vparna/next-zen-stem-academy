<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background elements -->
  <circle cx="350" cy="50" r="35" fill="#F3E8FF" opacity="0.6"/>
  <circle cx="60" cy="260" r="45" fill="#E0E7FF" opacity="0.6"/>
  
  <!-- Chess board -->
  <g transform="translate(150, 130)">
    <!-- Board background -->
    <rect x="0" y="0" width="120" height="120" rx="4" fill="#8B4513" stroke="#654321" stroke-width="3"/>
    <!-- Chess squares (simplified pattern) -->
    <rect x="5" y="5" width="25" height="25" fill="#F5DEB3"/>
    <rect x="30" y="5" width="25" height="25" fill="#8B4513"/>
    <rect x="55" y="5" width="25" height="25" fill="#F5DEB3"/>
    <rect x="80" y="5" width="25" height="25" fill="#8B4513"/>
    
    <rect x="5" y="30" width="25" height="25" fill="#8B4513"/>
    <rect x="30" y="30" width="25" height="25" fill="#F5DEB3"/>
    <rect x="55" y="30" width="25" height="25" fill="#8B4513"/>
    <rect x="80" y="30" width="25" height="25" fill="#F5DEB3"/>
    
    <rect x="5" y="55" width="25" height="25" fill="#F5DEB3"/>
    <rect x="30" y="55" width="25" height="25" fill="#8B4513"/>
    <rect x="55" y="55" width="25" height="25" fill="#F5DEB3"/>
    <rect x="80" y="55" width="25" height="25" fill="#8B4513"/>
    
    <rect x="5" y="80" width="25" height="25" fill="#8B4513"/>
    <rect x="30" y="80" width="25" height="25" fill="#F5DEB3"/>
    <rect x="55" y="80" width="25" height="25" fill="#8B4513"/>
    <rect x="80" y="80" width="25" height="25" fill="#F5DEB3"/>
    
    <!-- Chess pieces (simplified) -->
    <!-- White King -->
    <g transform="translate(17, 15)">
      <rect x="0" y="5" width="10" height="8" fill="#FFFFFF" stroke="#000" stroke-width="0.5"/>
      <rect x="3" y="0" width="4" height="5" fill="#FFFFFF" stroke="#000" stroke-width="0.5"/>
      <line x1="5" y1="-2" x2="5" y2="2" stroke="#000" stroke-width="1"/>
      <line x1="3" y1="0" x2="7" y2="0" stroke="#000" stroke-width="1"/>
    </g>
    <!-- Black Knight -->
    <g transform="translate(67, 90)">
      <path d="M 2 10 L 5 2 L 8 10 Z" fill="#000000"/>
      <circle cx="5" cy="4" r="2" fill="#000000"/>
    </g>
    <!-- White Pawn -->
    <circle cx="47" cy="65" r="4" fill="#FFFFFF" stroke="#000" stroke-width="0.5"/>
    <!-- Black Pawn -->
    <circle cx="22" cy="95" r="4" fill="#000000"/>
  </g>
  
  <!-- Kid 1 (Boy thinking) - left side -->
  <g transform="translate(40, 120)">
    <!-- Head -->
    <circle cx="30" cy="25" r="20" fill="#FBBF77"/>
    <!-- Hair -->
    <path d="M 15 20 Q 30 5 45 20" fill="#2D1810" stroke="#2D1810" stroke-width="2"/>
    <!-- Eyes (concentrating) -->
    <ellipse cx="23" cy="25" rx="3" ry="2" fill="#000"/>
    <ellipse cx="37" cy="25" rx="3" ry="2" fill="#000"/>
    <!-- Thinking expression -->
    <path d="M 24 32 Q 30 33 36 32" stroke="#000" stroke-width="1.5" fill="none"/>
    <!-- Body -->
    <rect x="15" y="45" width="30" height="45" rx="15" fill="#3B82F6"/>
    <!-- Arm reaching toward board -->
    <path d="M 45 55 Q 60 65 75 75" stroke="#FBBF77" stroke-width="10" stroke-linecap="round"/>
    <circle cx="75" cy="75" r="6" fill="#FBBF77"/>
    <!-- Other arm -->
    <path d="M 15 55 L 5 70" stroke="#FBBF77" stroke-width="10" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="20" y="88" width="10" height="28" rx="5" fill="#1E40AF"/>
    <rect x="30" y="88" width="10" height="28" rx="5" fill="#1E40AF"/>
  </g>
  
  <!-- Kid 2 (Girl excited) - right side -->
  <g transform="translate(280, 130)">
    <!-- Head -->
    <circle cx="30" cy="20" r="19" fill="#FDB4B4"/>
    <!-- Hair with bows -->
    <ellipse cx="30" cy="10" rx="20" ry="13" fill="#8B4513"/>
    <circle cx="12" cy="15" r="6" fill="#EC4899"/>
    <circle cx="48" cy="15" r="6" fill="#EC4899"/>
    <!-- Eyes (excited) -->
    <circle cx="24" cy="20" r="2.5" fill="#000"/>
    <circle cx="36" cy="20" r="2.5" fill="#000"/>
    <!-- Happy smile -->
    <path d="M 22 26 Q 30 30 38 26" stroke="#000" stroke-width="2" fill="none"/>
    <!-- Body -->
    <rect x="15" y="39" width="30" height="42" rx="15" fill="#A855F7"/>
    <!-- Arms raised in excitement -->
    <path d="M 15 47 Q 10 40 8 32" stroke="#FDB4B4" stroke-width="9" stroke-linecap="round"/>
    <path d="M 45 47 Q 50 40 52 32" stroke="#FDB4B4" stroke-width="9" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="19" y="79" width="10" height="25" rx="5" fill="#7C3AED"/>
    <rect x="31" y="79" width="10" height="25" rx="5" fill="#7C3AED"/>
  </g>
  
  <!-- Thought bubble -->
  <g transform="translate(60, 60)">
    <ellipse cx="30" cy="20" rx="35" ry="18" fill="#FFFFFF" stroke="#6B7280" stroke-width="2"/>
    <circle cx="20" cy="35" r="4" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5"/>
    <circle cx="15" cy="42" r="3" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5"/>
    <text x="30" y="23" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6B21A8" text-anchor="middle">Checkmate?</text>
  </g>
  
  <!-- Sparkles -->
  <g fill="#FBBF24">
    <path d="M 320 80 l 3 7 l 7 1 l -5 5 l 2 7 l -7 -4 l -7 4 l 2 -7 l -5 -5 l 7 -1 z"/>
    <path d="M 110 180 l 2 4 l 4 0.5 l -3 3 l 1 4 l -4 -2 l -4 2 l 1 -4 l -3 -3 l 4 -0.5 z"/>
    <path d="M 340 190 l 2.5 5 l 5 0.7 l -4 4 l 1.5 5 l -5 -3 l -5 3 l 1.5 -5 l -4 -4 l 5 -0.7 z"/>
  </g>
  
  <!-- Trophy icon (motivation) -->
  <g transform="translate(190, 30)">
    <path d="M 10 15 L 5 20 L 15 20 Z" fill="#FBBF24" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="8" y="10" width="4" height="8" rx="1" fill="#FBBF24" stroke="#F59E0B" stroke-width="1"/>
    <ellipse cx="10" cy="9" rx="5" ry="3" fill="#FBBF24" stroke="#F59E0B" stroke-width="1"/>
    <path d="M 5 10 Q 2 12 2 15" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
    <path d="M 15 10 Q 18 12 18 15" stroke="#F59E0B" stroke-width="1.5" fill="none"/>
  </g>
</svg>

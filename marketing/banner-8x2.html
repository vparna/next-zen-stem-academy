<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Next Zen Academy - 8ft x 2ft Banner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0;
    }

    /* Banner dimensions: 8ft x 2ft = 96in x 24in = 14400px x 3600px at 150 DPI */
    .banner {
      width: 14400px;
      height: 3600px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 200px 300px;
    }

    /* Decorative elements */
    .banner::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 100%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
      50% { transform: scale(1.1) rotate(5deg); opacity: 0.8; }
    }

    /* Left section - Logo and branding */
    .left-section {
      flex: 0 0 35%;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 100px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 80px;
      margin-bottom: 80px;
    }

    .logo {
      width: 400px;
      height: 400px;
      background: white;
      border-radius: 80px;
      padding: 60px;
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 100%;
      height: 100%;
    }

    .brand-section {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .brand-name {
      color: white;
    }

    .brand-name h1 {
      font-size: 220px;
      font-weight: 900;
      text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
      line-height: 1.1;
      margin-bottom: 30px;
      letter-spacing: -2px;
    }

    .brand-name .tagline {
      font-size: 90px;
      opacity: 0.95;
      font-weight: 500;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .coming-soon {
      background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
      color: #333;
      display: inline-block;
      padding: 50px 120px;
      border-radius: 120px;
      font-size: 120px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      letter-spacing: 8px;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(255, 215, 0, 0.5); }
      50% { box-shadow: 0 20px 80px rgba(0, 0, 0, 0.4), 0 0 80px rgba(255, 215, 0, 0.8); }
    }

    /* Right section - Courses */
    .right-section {
      flex: 0 0 55%;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 60px;
    }

    .courses-header {
      color: white;
      font-size: 110px;
      font-weight: 800;
      text-align: center;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
      margin-bottom: 80px;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 80px;
    }

    .course-card {
      background: white;
      border-radius: 60px;
      padding: 100px 80px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.3);
      text-align: center;
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .course-icon {
      font-size: 240px;
      display: block;
      margin-bottom: 40px;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.2));
    }

    .course-name {
      font-size: 100px;
      font-weight: 800;
      color: #333;
      margin-bottom: 30px;
      line-height: 1.2;
    }

    .course-description {
      font-size: 60px;
      color: #666;
      line-height: 1.4;
    }

    /* Contact info */
    .contact-section {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 150px;
      color: white;
      font-size: 70px;
      font-weight: 600;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      z-index: 10;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255, 255, 255, 0.15);
      padding: 40px 80px;
      border-radius: 60px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div class="banner">
    <!-- Left Section: Logo and Branding -->
    <div class="left-section">
      <div class="logo-container">
        <div class="logo">
          <!-- Next Zen Academy Logo SVG -->
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Zen circle -->
            <circle cx="100" cy="100" r="90" fill="none" stroke="#667eea" stroke-width="4"/>
            <!-- STEM elements -->
            <path d="M 100 30 L 140 80 L 60 80 Z" fill="#764ba2" opacity="0.8"/>
            <circle cx="100" cy="120" r="25" fill="#667eea" opacity="0.8"/>
            <rect x="75" y="150" width="50" height="30" rx="5" fill="#764ba2" opacity="0.8"/>
            <!-- Center dot -->
            <circle cx="100" cy="100" r="10" fill="#667eea"/>
          </svg>
        </div>
        <div class="brand-section">
          <div class="brand-name">
            <h1>NEXT ZEN<br>ACADEMY</h1>
            <p class="tagline">3S: Skills • Science • Success</p>
          </div>
        </div>
      </div>
      <div class="coming-soon">COMING SOON!</div>
    </div>

    <!-- Right Section: Courses -->
    <div class="right-section">
      <h2 class="courses-header">Our Programs</h2>
      <div class="courses-grid">
        <div class="course-card">
          <span class="course-icon">🤖</span>
          <h3 class="course-name">Robotics</h3>
          <p class="course-description">Build & program robots</p>
        </div>
        <div class="course-card">
          <span class="course-icon">🔢</span>
          <h3 class="course-name">Mathematics</h3>
          <p class="course-description">Master math concepts</p>
        </div>
        <div class="course-card">
          <span class="course-icon">♟️</span>
          <h3 class="course-name">Chess</h3>
          <p class="course-description">Strategic thinking</p>
        </div>
      </div>
    </div>

    <!-- Contact Information -->
    <div class="contact-section">
      <div class="contact-item">📧 admin@nextzenacademy.com</div>
      <div class="contact-item">📱 +1 (425) 325-0431</div>
      <div class="contact-item">🌐 www.nextzenacademy.com</div>
    </div>
  </div>
</body>
</html>
